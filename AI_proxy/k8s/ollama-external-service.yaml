apiVersion: v1
kind: Service
metadata:
  name: ollama-external
  namespace: default
spec:
  ports:
    - name: http
      port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ollama-external
  namespace: default
subsets:
  - addresses:
      - ip: 192.168.1.146
    ports:
      - name: http
        port: 11434
        protocol: TCP
